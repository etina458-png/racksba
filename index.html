<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Webmail Login - moreyYACC technology</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="outer">

  <div class="box">

    <!-- HEADER -->
    <div class="header">
      <div class="header-left">Webmail Login</div>

      <div class="header-right">
        <div class="brand-top">rackspace</div>
        <div class="brand-bottom">technology</div>
      </div>
    </div>

    <!-- BODY -->
    <div class="body-area">

      <!-- LEFT CARD -->
      <div class="left-card">
        <h2>SUSPICIOUS<br>EMAIL</h2>
        <p>Learn to quickly<br>identify and report</p>

        <div class="shield">
  <svg width="120" height="130" viewBox="0 0 120 130">

    <!-- Shield background -->
    <path d="M60 5 
             Q100 10 105 40 
             V75 
             Q100 105 60 125 
             Q20 105 15 75 
             V40 
             Q20 10 60 5 Z"
          fill="#f4b942"
          stroke="#d68a1f"
          stroke-width="4"/>

    <!-- Envelope -->
    <rect x="30" y="45" width="60" height="40"
          fill="#ffffff"
          stroke="#9aa0a6"
          stroke-width="3"/>

    <!-- Envelope lines -->
    <line x1="30" y1="45" x2="60" y2="70"
          stroke="#9aa0a6" stroke-width="3"/>
    <line x1="90" y1="45" x2="60" y2="70"
          stroke="#9aa0a6" stroke-width="3"/>

    <!-- Warning triangle -->
    <polygon points="60,55 75,80 45,80"
             fill="#e67e22"/>

    <!-- Exclamation mark -->
    <line x1="60" y1="63" x2="60" y2="72"
          stroke="#ffffff"
          stroke-width="3"/>
    <circle cx="60" cy="76" r="2"
            fill="#ffffff"/>

  </svg>
</div>

        <button class="see">SEE HOW ></button>
      </div>

      <!-- DIVIDER -->
      <div class="divider"></div>

      <!-- RIGHT FORM -->
      <div class="right-form">

        <label>Email address</label>
        <input type="email">

        <div class="pass-row">
          <label>Password</label>
          <a href="#">Forgot password?</a>
        </div>

        <input type="password">

        <div class="btn-row">
          <button class="login">Log In</button>
          
        </div>

        <div class="links">
          <a href="#">Privacy Statement</a>
          <span>|</span>
          <a href="#">Website Terms</a>
        </div>

      </div>

    </div>

    <!-- FOOTER -->
    <div class="footer">
      Need webmail for your business? Learn more about
      <a href="#">Hosted Email</a> from Rackspace
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
